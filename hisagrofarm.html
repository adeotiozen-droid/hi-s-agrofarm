<style>
body { margin:0; font-family: Arial, sans-serif; background:#f1f5f9; color:#0f172a; }
.container { max-width:1150px; margin:auto; padding:18px; }
.card { background:white; border-radius:24px; padding:24px; box-shadow:0 10px 30px rgba(15,23,42,.10); margin-bottom:18px; border:1px solid #e2e8f0; }
h1 { margin:0; font-size:36px; }
.muted { color:#64748b; line-height:1.5; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.info { background:#f8fafc; border-radius:18px; padding:16px; border:1px solid #e2e8f0; }
button { border:0; border-radius:15px; padding:13px 18px; font-weight:800; cursor:pointer; font-size:15px; }
.primary { background:#0f172a; color:white; }
.green { background:#047857; color:white; }
.light { background:#e2e8f0; color:#0f172a; }
.option { display:block; width:100%; text-align:left; background:white; border:2px solid #cbd5e1; margin:10px 0; }
.option:hover { background:#f8fafc; }
.option.selected { background:#0f172a; color:white; border-color:#0f172a; }
.topbar { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center; position:sticky; top:0; background:#f1f5f9; padding:10px 0; z-index:5; }
.badge { background:#e2e8f0; padding:10px 14px; border-radius:13px; font-weight:900; display:inline-block; margin:3px; }
.danger { background:#fee2e2; color:#b91c1c; }
.layout { display:grid; grid-template-columns:1fr 320px; gap:18px; }
.nav { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; max-height:520px; overflow:auto; }
.nav button { padding:10px 0; background:#f8fafc; border:1px solid #cbd5e1; }
.nav button.answered { background:#dcfce7; border-color:#86efac; }
.nav button.current { background:#0f172a; color:white; }
.correct { background:#ecfdf5; border:2px solid #6ee7b7; }
.wrong { background:#fff1f2; border:2px solid #fda4af; }
select { padding:12px; border-radius:12px; font-weight:800; border:1px solid #cbd5e1; }
.small { font-size:13px; }
@media(max-width:850px) { .layout,.grid { grid-template-columns:1fr; } h1 {font-size:27px;} }

const questions = [{"topic": "Rotational Motion", "question": "A rigid body rotates with all particles having the same angular velocity. Which quantity differs for particles at different radii?", "options": ["Angular displacement", "Angular velocity", "Time period", "Tangential velocity"], "answer": "Tangential velocity", "explanation": "For a rigid body, angular velocity is common, but v = rω, so tangential velocity depends on radius."}, {"topic": "Rotational Motion", "question": "If angular displacement is measured in radians, why is radian treated as dimensionless in dimensional analysis?", "options": ["It is measured with a stopwatch", "It is equal to force divided by mass", "It is a ratio of arc length to radius", "It has no physical meaning"], "answer": "It is a ratio of arc length to radius", "explanation": "θ = s/r, and both s and r have dimension L, so θ is dimensionless."}, {"topic": "Rotational Motion", "question": "Which rotational quantity corresponds to linear acceleration in translational motion?", "options": ["Angular displacement", "Moment of inertia only", "Torque", "Angular acceleration"], "answer": "Angular acceleration", "explanation": "Linear acceleration measures change of linear velocity; angular acceleration measures change of angular velocity."}, {"topic": "Torque", "question": "Maximum torque is produced when the angle between force and radius vector is ____.", "options": ["0°", "180°", "90°", "45°"], "answer": "90°", "explanation": "τ = Fr sinθ, and sin90° = 1, giving maximum torque."}, {"topic": "Torque", "question": "A force passes exactly through the pivot. What is the torque about the pivot?", "options": ["Maximum", "Equal to force", "Equal to radius", "Zero"], "answer": "Zero", "explanation": "The perpendicular distance from pivot is zero, so torque is zero."}, {"topic": "Torque", "question": "Two forces form a couple. The net force is zero but the body may still ____.", "options": ["Translate only", "Have zero torque always", "Lose mass", "Rotate"], "answer": "Rotate", "explanation": "A couple produces a turning effect with zero resultant force."}, {"topic": "Moment of Force", "question": "The principle of moments is useful mainly for bodies in ____.", "options": ["Free fall only", "Thermal equilibrium only", "Rotational equilibrium", "Uniform temperature"], "answer": "Rotational equilibrium", "explanation": "For rotational equilibrium, clockwise moments equal anticlockwise moments."}, {"topic": "Coordinate Rotation", "question": "When coordinate axes are rotated, the physical position of a point ____.", "options": ["Must change", "Loses direction", "Does not change", "Becomes zero"], "answer": "Does not change", "explanation": "Only the reference axes change; the point itself remains physically unchanged."}, {"topic": "Vectors", "question": "A vector has constant magnitude but changing direction. What can be said about its derivative?", "options": ["It may be non-zero", "It is always scalar", "It is always zero", "It has no unit"], "answer": "It may be non-zero", "explanation": "Even with constant magnitude, changing direction gives a non-zero rate of change."}, {"topic": "Vectors", "question": "If A·B = 0 and neither vector is zero, the vectors are ____.", "options": ["Equal", "Scalars", "Perpendicular", "Parallel"], "answer": "Perpendicular", "explanation": "Dot product is zero for perpendicular vectors."}, {"topic": "Vectors", "question": "If A × B = 0 and neither vector is zero, the vectors are ____.", "options": ["Randomly directed", "Perpendicular only", "Unit vectors only", "Parallel or anti-parallel"], "answer": "Parallel or anti-parallel", "explanation": "Cross product magnitude is AB sinθ, zero when θ = 0° or 180°."}, {"topic": "Tangential Motion", "question": "If angular velocity is constant, tangential acceleration is ____.", "options": ["Equal to mg", "Equal to v²/r", "Maximum", "Zero"], "answer": "Zero", "explanation": "Tangential acceleration is due to change in speed; constant angular velocity means α = 0."}, {"topic": "Tangential Motion", "question": "A particle in uniform circular motion has no tangential acceleration but has ____.", "options": ["Only scalar acceleration", "No acceleration at all", "Centripetal acceleration", "Only angular displacement"], "answer": "Centripetal acceleration", "explanation": "Direction changes continuously, giving centripetal acceleration."}, {"topic": "Centripetal Motion", "question": "Centripetal force is not a new kind of force because it is ____.", "options": ["Always friction only", "Always tension only", "Always gravity only", "The name for the resultant inward force"], "answer": "The name for the resultant inward force", "explanation": "Different real forces can provide the inward centripetal force."}, {"topic": "Centripetal Motion", "question": "If speed doubles while radius stays constant, centripetal acceleration becomes ____.", "options": ["Four times", "Two times", "Unchanged", "Half"], "answer": "Four times", "explanation": "a꜀ = v²/r, so doubling v makes a꜀ four times larger."}, {"topic": "Centripetal Motion", "question": "If radius doubles while speed stays constant, centripetal force becomes ____.", "options": ["Zero", "Half", "Four times", "Double"], "answer": "Half", "explanation": "F꜀ = mv²/r, so doubling r halves the force."}, {"topic": "Normal Force", "question": "For an object on a horizontal surface with no vertical acceleration, the normal reaction equals ____.", "options": ["mv²/r", "zero always", "GM/r", "mg"], "answer": "mg", "explanation": "Vertical forces balance, so N = mg."}, {"topic": "Measurement", "question": "Dimensional analysis can be used to check ____.", "options": ["Exact numerical constants", "Instrument brand", "Homogeneity of equations", "Colour of object"], "answer": "Homogeneity of equations", "explanation": "A valid physical equation must have the same dimensions on both sides."}, {"topic": "Dimensions", "question": "Which expression has the dimension of energy?", "options": ["Pressure ÷ area", "Mass ÷ acceleration", "Force ÷ distance", "Force × distance"], "answer": "Force × distance", "explanation": "Work/energy = force × displacement."}, {"topic": "Dimensions", "question": "Which of these is dimensionless?", "options": ["Strain", "Force", "Pressure", "Momentum"], "answer": "Strain", "explanation": "Strain is extension/original length, so it is dimensionless."}, {"topic": "Vector Differentiation", "question": "If position vector is constant, velocity is ____.", "options": ["Zero", "Infinite", "Equal to acceleration", "Constant non-zero"], "answer": "Zero", "explanation": "Velocity is the derivative of position with respect to time."}, {"topic": "Vector Differentiation", "question": "If velocity vector is constant, acceleration is ____.", "options": ["Zero", "Equal to displacement", "Maximum", "Equal to velocity"], "answer": "Zero", "explanation": "Acceleration is the derivative of velocity."}, {"topic": "Gravitation", "question": "Why does gravitational force between ordinary classroom objects seem very small?", "options": ["Their masses are zero", "Distance has no effect", "Gravity works only in space", "G is extremely small"], "answer": "G is extremely small", "explanation": "The universal gravitational constant is very small."}, {"topic": "Gravitation", "question": "If distance between two masses is tripled, gravitational force becomes ____.", "options": ["One-third", "Nine times", "One-ninth", "Three times"], "answer": "One-ninth", "explanation": "F ∝ 1/r², so tripling r gives 1/9 of the force."}, {"topic": "Gravitation", "question": "The gravitational field strength at distance r from mass M is ____.", "options": ["GM/r", "GM/r²", "GMr²", "r²/GM"], "answer": "GM/r²", "explanation": "g = gravitational force per unit mass = GM/r²."}, {"topic": "Gravitational Potential", "question": "Gravitational potential is negative because gravitational force is ____.", "options": ["Repulsive", "Zero", "Attractive", "Frictional"], "answer": "Attractive", "explanation": "Taking zero potential at infinity makes potential near a mass negative."}, {"topic": "Gravitational Potential", "question": "As a body moves from Earth’s surface to infinity, its gravitational potential ____.", "options": ["Stays constant", "Becomes more negative", "Decreases without limit", "Increases toward zero"], "answer": "Increases toward zero", "explanation": "V = -GM/r; as r increases, V approaches 0 from below."}, {"topic": "Escape Velocity", "question": "Escape velocity does not depend on the mass of the escaping object because ____.", "options": ["The object has no weight", "Only radius matters always", "Mass cancels during energy calculation", "Gravity stops acting"], "answer": "Mass cancels during energy calculation", "explanation": "In deriving escape speed, kinetic and potential energies both contain the object's mass."}, {"topic": "Escape Velocity", "question": "If a planet has the same mass but four times the radius, its escape velocity becomes ____.", "options": ["Unchanged", "Double", "Half", "Four times"], "answer": "Half", "explanation": "vₑ = √(2GM/R), so making R four times gives vₑ/2."}, {"topic": "Kepler's Laws", "question": "Kepler's second law is a consequence of conservation of ____.", "options": ["Angular momentum", "Linear temperature", "Electric charge only", "Mass density"], "answer": "Angular momentum", "explanation": "Equal areas in equal times follows from conservation of angular momentum."}, {"topic": "Kepler's Laws", "question": "For circular orbits around the same central mass, T²/r³ is ____.", "options": ["Zero", "Constant", "Equal to speed", "Increasing linearly"], "answer": "Constant", "explanation": "Kepler's third law gives T²/r³ = constant for bodies orbiting the same mass."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 0 rad/s and angular acceleration 3 rad/s² for 6 s. Find the final angular velocity.", "options": ["18 rad/s", "27 rad/s", "21 rad/s", "9 rad/s"], "answer": "18 rad/s", "explanation": "Use ω = ω₀ + αt = 0 + (3)(6)."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 0 rad/s and angular acceleration 3 rad/s² for 6 s. Find the angular displacement.", "options": ["81 rad", "64 rad", "54 rad", "27 rad"], "answer": "54 rad", "explanation": "Use θ = ω₀t + 1/2 αt² = 0(6) + 1/2(3)(6)²."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 2 rad/s and angular acceleration 4 rad/s² for 5 s. Find the final angular velocity.", "options": ["33 rad/s", "11 rad/s", "32 rad/s", "22 rad/s"], "answer": "22 rad/s", "explanation": "Use ω = ω₀ + αt = 2 + (4)(5)."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 2 rad/s and angular acceleration 4 rad/s² for 5 s. Find the angular displacement.", "options": ["60 rad", "63 rad", "30 rad", "90 rad"], "answer": "60 rad", "explanation": "Use θ = ω₀t + 1/2 αt² = 2(5) + 1/2(4)(5)²."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 5 rad/s and angular acceleration -1 rad/s² for 3 s. Find the final angular velocity.", "options": ["2 rad/s", "1 rad/s", "3 rad/s", "4 rad/s"], "answer": "2 rad/s", "explanation": "Use ω = ω₀ + αt = 5 + (-1)(3)."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 5 rad/s and angular acceleration -1 rad/s² for 3 s. Find the angular displacement.", "options": ["15.75 rad", "15.5 rad", "5.25 rad", "10.5 rad"], "answer": "10.5 rad", "explanation": "Use θ = ω₀t + 1/2 αt² = 5(3) + 1/2(-1)(3)²."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 10 rad/s and angular acceleration -2 rad/s² for 4 s. Find the final angular velocity.", "options": ["7 rad/s", "3 rad/s", "2 rad/s", "1 rad/s"], "answer": "2 rad/s", "explanation": "Use ω = ω₀ + αt = 10 + (-2)(4)."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 10 rad/s and angular acceleration -2 rad/s² for 4 s. Find the angular displacement.", "options": ["12 rad", "24 rad", "34 rad", "36 rad"], "answer": "24 rad", "explanation": "Use θ = ω₀t + 1/2 αt² = 10(4) + 1/2(-2)(4)²."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 1.5 rad/s and angular acceleration 2.5 rad/s² for 8 s. Find the final angular velocity.", "options": ["26.5 rad/s", "21.5 rad/s", "10.75 rad/s", "32.25 rad/s"], "answer": "21.5 rad/s", "explanation": "Use ω = ω₀ + αt = 1.5 + (2.5)(8)."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 1.5 rad/s and angular acceleration 2.5 rad/s² for 8 s. Find the angular displacement.", "options": ["46 rad", "97 rad", "92 rad", "138 rad"], "answer": "92 rad", "explanation": "Use θ = ω₀t + 1/2 αt² = 1.5(8) + 1/2(2.5)(8)²."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 4 rad/s and angular acceleration 0.75 rad/s² for 12 s. Find the final angular velocity.", "options": ["16 rad/s", "19.5 rad/s", "6.5 rad/s", "13 rad/s"], "answer": "13 rad/s", "explanation": "Use ω = ω₀ + αt = 4 + (0.75)(12)."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 4 rad/s and angular acceleration 0.75 rad/s² for 12 s. Find the angular displacement.", "options": ["51 rad", "153 rad", "112 rad", "102 rad"], "answer": "102 rad", "explanation": "Use θ = ω₀t + 1/2 αt² = 4(12) + 1/2(0.75)(12)²."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 8 rad/s and angular acceleration -0.5 rad/s² for 10 s. Find the final angular velocity.", "options": ["8 rad/s", "1.5 rad/s", "3 rad/s", "4.5 rad/s"], "answer": "3 rad/s", "explanation": "Use ω = ω₀ + αt = 8 + (-0.5)(10)."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 8 rad/s and angular acceleration -0.5 rad/s² for 10 s. Find the angular displacement.", "options": ["57 rad", "82.5 rad", "27.5 rad", "55 rad"], "answer": "55 rad", "explanation": "Use θ = ω₀t + 1/2 αt² = 8(10) + 1/2(-0.5)(10)²."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 6 rad/s and angular acceleration 1.2 rad/s² for 7 s. Find the final angular velocity.", "options": ["7.2 rad/s", "16.4 rad/s", "14.4 rad/s", "21.6 rad/s"], "answer": "14.4 rad/s", "explanation": "Use ω = ω₀ + αt = 6 + (1.2)(7)."}, {"topic": "Rotational Kinematics", "question": "A flywheel has initial angular velocity 6 rad/s and angular acceleration 1.2 rad/s² for 7 s. Find the angular displacement.", "options": ["71.4 rad", "107.1 rad", "74.4 rad", "35.7 rad"], "answer": "71.4 rad", "explanation": "Use θ = ω₀t + 1/2 αt² = 6(7) + 1/2(1.2)(7)²."}, {"topic": "Angular Motion", "question": "A particle covers an arc length of 24 m on a circle of radius 4 m in 3 s. Find its angular velocity.", "options": ["2 rad/s", "5 rad/s", "1 rad/s", "3 rad/s"], "answer": "2 rad/s", "explanation": "First θ = s/r = 24/4; then ω = θ/t."}, {"topic": "Angular Motion", "question": "A particle covers an arc length of 50 m on a circle of radius 5 m in 2 s. Find its angular velocity.", "options": ["5 rad/s", "15 rad/s", "7.5 rad/s", "2.5 rad/s"], "answer": "5 rad/s", "explanation": "First θ = s/r = 50/5; then ω = θ/t."}, {"topic": "Angular Motion", "question": "A particle covers an arc length of 18 m on a circle of radius 3 m in 6 s. Find its angular velocity.", "options": ["3 rad/s", "0.5 rad/s", "1 rad/s", "1.5 rad/s"], "answer": "1 rad/s", "explanation": "First θ = s/r = 18/3; then ω = θ/t."}, {"topic": "Angular Motion", "question": "A particle covers an arc length of 36 m on a circle of radius 6 m in 4 s. Find its angular velocity.", "options": ["2.25 rad/s", "6.5 rad/s", "0.75 rad/s", "1.5 rad/s"], "answer": "1.5 rad/s", "explanation": "First θ = s/r = 36/6; then ω = θ/t."}, {"topic": "Angular Motion", "question": "A particle covers an arc length of 45 m on a circle of radius 9 m in 5 s. Find its angular velocity.", "options": ["1.5 rad/s", "0.5 rad/s", "4 rad/s", "1 rad/s"], "answer": "1 rad/s", "explanation": "First θ = s/r = 45/9; then ω = θ/t."}, {"topic": "Angular Motion", "question": "A particle covers an arc length of 72 m on a circle of radius 8 m in 6 s. Find its angular velocity.", "options": ["0.75 rad/s", "2.25 rad/s", "4.5 rad/s", "1.5 rad/s"], "answer": "1.5 rad/s", "explanation": "First θ = s/r = 72/8; then ω = θ/t."}, {"topic": "Angular Motion", "question": "A particle covers an arc length of 15 m on a circle of radius 2.5 m in 5 s. Find its angular velocity.", "options": ["1.2 rad/s", "0.6 rad/s", "3.2 rad/s", "1.8 rad/s"], "answer": "1.2 rad/s", "explanation": "First θ = s/r = 15/2.5; then ω = θ/t."}, {"topic": "Angular Motion", "question": "A particle covers an arc length of 100 m on a circle of radius 10 m in 20 s. Find its angular velocity.", "options": ["0.5 rad/s", "3.5 rad/s", "0.25 rad/s", "0.75 rad/s"], "answer": "0.5 rad/s", "explanation": "First θ = s/r = 100/10; then ω = θ/t."}, {"topic": "Torque", "question": "A force of 40 N acts at radius 0.5 m making angle 30° with the radius vector. Calculate the torque.", "options": ["5 Nm", "10 Nm", "15 Nm", "13 Nm"], "answer": "10 Nm", "explanation": "Use τ = Fr sinθ = 40 × 0.5 × sin30°."}, {"topic": "Torque", "question": "A force of 60 N acts at radius 0.4 m making angle 60° with the radius vector. Calculate the torque.", "options": ["22.785 Nm", "31.177 Nm", "10.392 Nm", "20.785 Nm"], "answer": "20.785 Nm", "explanation": "Use τ = Fr sinθ = 60 × 0.4 × sin60°."}, {"topic": "Torque", "question": "A force of 100 N acts at radius 0.25 m making angle 90° with the radius vector. Calculate the torque.", "options": ["25 Nm", "12.5 Nm", "37.5 Nm", "30 Nm"], "answer": "25 Nm", "explanation": "Use τ = Fr sinθ = 100 × 0.25 × sin90°."}, {"topic": "Torque", "question": "A force of 80 N acts at radius 1.2 m making angle 45° with the radiu ocity is the minimum speed to just escape, reaching infinity with zero speed."}, {"topic": "Kepler's Laws", "question": "If a satellite has smaller orbital radius around Earth, its orbital period is _____.", "options": ["Longer always", "Infinite", "Shorter", "Unchanged"], "answer": "Shorter", "explanation": "From T² ∝ r³, smaller r gives smaller T."}, {"topic": "Torque", "question": "A force of 120 N is applied to a door at 0.75 m from the hinge at an angle of 30° to the door surface. If the perpendicular component causes rotation, calculate the torque.", "options": ["45 Nm", "90 Nm", "120 Nm", "180 Nm"], "answer": "45 Nm", "explanation": "Torque = Fr sinθ = 120 × 0.75 × sin30° = 45 Nm."}, {"topic": "Dimensional Analysis", "question": "A physical quantity Q is given by Q = pressure × volume. What is the dimension of Q?", "options": ["ML²T⁻²", "MLT⁻²", "ML⁻¹T⁻²", "ML²T⁻³"], "answer": "ML²T⁻²", "explanation": "Pressure has dimension ML⁻¹T⁻² and volume has L³, so Q = ML²T⁻², same as energy."}, {"topic": "Escape Velocity", "question": "If the mass and radius of a planet are both doubled, what happens to its escape velocity?", "options": ["It remains unchanged", "It doubles", "It halves", "It becomes four times"], "answer": "It remains unchanged", "explanation": "Escape velocity vₑ = √(2GM/R). If M and R are both doubled, M/R remains the same, so escape velocity is unchanged."}];
let started = false;
let submitted = false;
let duration = 120;
let timeLeft = duration * 60;
let current = 0;
let answers = {};
let timer = null;

function fmt(s) {
  const m = Math.floor(s/60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function score() {
  return questions.reduce((a,q,i)=> a + (answers[i] === q.answer ? 1 : 0), 0);
}

function start() {
  started = true;
  submitted = false;
  timeLeft = duration * 60;
  render();
  clearInterval(timer);
  timer = setInterval(()=> {
    if(!started || submitted) return;
    timeLeft--;
    if(timeLeft <= 0) {
      timeLeft = 0;
      submitted = true;
      clearInterval(timer);
    }
    render();
  },1000);
}

function restart() {
  started = false;
  submitted = false;
  current = 0;
  answers = {};
  timeLeft = duration * 60;
  clearInterval(timer);
  render();
}

function choose(opt) {
  if(submitted) return;
  answers[current] = opt;
  render();
}

function renderStart() {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h1>PHY 101 Difficult CBT Practice</h1>
      <p class="muted">200 original difficult questions from the PHY 101 topics we covered. This version includes harder calculations, dimensional analysis, vector differentiation, gravitation, torque, circular motion, and Kepler's law.</p>
      <div class="grid">
        <div class="info"><b>Questions</b><h2>200</h2><p>Hard objective CBT</p></div>
        <div class="info"><b>Difficulty</b><h2>High</h2><p>More calculations and reasoning</p></div>
        <div class="info"><b>After Submit</b><h2>Corrections</h2><p>Answers and explanations</p></div>
      </div>
      <br>
      <label><b>Choose timer duration:</b></label><br><br>
      <select onchange="duration=Number(this.value); timeLeft=duration*60">
        <option value="60">60 minutes</option>
        <option value="90">90 minutes</option>
        <option value="120" selected>120 minutes</option>
        <option value="150">150 minutes</option>
        <option value="180">180 minutes</option>
      </select>
      <br><br>
      <button class="primary" onclick="start()">Start Difficult Quiz</button>
      <p class="muted small">Tip: Use rough paper and calculator for the numerical questions.</p>
    </div>`;
}

function renderQuiz() {
  const q = questions[current];
  const answered = Object.keys(answers).length;
  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div><h2>PHY 101 Difficult CBT</h2><span class="muted">Answered ${answered} of ${questions.length}</span></div>
      <div>
        <span class="badge ${timeLeft<300?'danger':''}">⏱ ${fmt(timeLeft)}</span>
        <span class="badge">Score hidden</span>
        <button class="light" onclick="restart()">Restart</button>
      </div>
    </div>
    <div class="layout">
      <div class="card">
        <p><b>Question ${current+1} / ${questions.length}</b> <span class="badge">${q.topic}</span></p>
        <h2>${q.question}</h2>
        ${q.options.map((o,i)=>`<button class="option ${answers[current]===o?'selected':''}" onclick='choose(${JSON.stringify(o)})'><b>${String.fromCharCode(65+i)}.</b> ${o}</button>`).join('')}
        <br>
        <button class="light" onclick="current=Math.max(0,current-1);render()" ${current===0?'disabled':''}>Previous</button>
        ${current<questions.length-1 ? `<button class="primary" onclick="current++;render()">Next</button>` : `<button class="green" onclick="submitted=true;clearInterval(timer);render()">Submit</button>`}
      </div>
      <div class="card">
        <h3>Question Map</h3>
        <div class="nav">
          ${questions.map((_,i)=>`<button class="${current===i?'current':answers[i]?'answered':''}" onclick="current=${i};render()">${i+1}</button>`).join('')}
        </div>
        <br>
        <button class="green" style="width:100%" onclick="submitted=true;clearInterval(timer);render()">Submit Quiz</button>
      </div>
    </div>`;
}

function renderResult() {
  const s = score();
  const percent = Math.round((s/questions.length)*100);
  let grade = percent >= 75 ? "Excellent" : percent >= 60 ? "Good" : percent >= 45 ? "Fair" : "Needs serious revision";
  document.getElementById('app').innerHTML = `
    <div class="card" style="text-align:center">
      <h1>Your Score: ${s}/${questions.length}</h1>
      <h2>Percentage: ${percent}% — ${grade}</h2>
      <p class="muted">Review the corrections carefully. These questions are intentionally difficult.</p>
      <button class="primary" onclick="restart()">Retake Quiz</button>
    </div>
    <div class="card">
      <h2>Corrections</h2>
      ${questions.map((q,i)=>`
        <div class="${answers[i]===q.answer?'correct':'wrong'}" style="border-radius:16px;padding:14px;margin:12px 0">
          <b>${i+1}. ${q.question}</b>
          <p><b>Your answer:</b> ${answers[i] || 'Not answered'}</p>
          <p><b>Correct answer:</b> ${q.answer}</p>
          <p><b>Explanation:</b> ${q.explanation}</p>
        </div>`).join('')}
    </div>`;
}

function render() {
  if(!started) renderStart();
  else if(submitted) renderResult();
  else renderQuiz();
}
render();
</script>
</body>
</html>
